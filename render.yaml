services:
  # Backend Service
  - type: web
    name: dudu-move-backend
    env: node
    plan: free
    # הבנייה חייבת לרוץ משורש המונו-רפו (pnpm workspace) כדי שחבילת "shared"
    # תיבנה ותקושר לפני ה-backend (התלוי בה דרך "shared": "workspace:*").
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter shared build && pnpm --filter backend build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add your MongoDB URI and other environment variables in Render dashboard
    healthCheckPath: /health

  # Static Site (Frontend) - Deploy separately to Netlify
  # This configuration is for reference only