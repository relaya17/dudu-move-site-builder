services:
  # Backend Service
  - type: web
    name: dudu-move-backend
    env: node
    plan: free
    # הבנייה חייבת לרוץ משורש המונו-רפו (pnpm workspace) כדי שחבילת "shared"
    # תיבנה ותקושר לפני ה-backend (התלוי בה דרך "shared": "workspace:*").
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter shared build && pnpm --filter dudu-move-frontend build && pnpm --filter backend build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
    healthCheckPath: /health